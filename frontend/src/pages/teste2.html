<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md">

    <div class="bg-white p-8 rounded-xl shadow border">

      <!-- Ícone grande (logo do sistema) -->
      <div class="flex justify-center mb-4">
        <div class="bg-gray-200 p-4 rounded-xl">
          <svg class="w-12 h-12 text-gray-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z"/>
          </svg>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-center mb-6">
        Sistema de Gestão de Desempenho
      </h1>

      <form class="flex flex-col gap-4">

        <input 
          type="email" 
          placeholder="Digite seu e-mail"
          class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <input 
          type="password" 
          placeholder="Digite sua senha"
          class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <button 
          class="bg-gray-500 text-white p-3 rounded-lg hover:bg-gray-900 transition">
          Entrar
        </button>

      </form>

    </div>

    <p class="text-center text-gray-500 mt-4 text-sm">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor.
    </p>

  </div>

</body>
</html>
