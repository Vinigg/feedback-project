<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Perguntas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER REUTILIZÁVEL -->
<header class="bg-white shadow fixed top-0 left-0 w-full z-50">
  <div class="flex items-center justify-between p-4">

    <div class="flex items-center gap-3">
      <div class="bg-gray-200 p-2 rounded-lg">
        <!-- Ícone painel -->
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z"/>
        </svg>
      </div>
      <h1 class="font-semibold text-lg">Painel do Sistema</h1>
    </div>

    <button class="flex items-center gap-2 text-gray-600 hover:text-red-500">
      <div class="bg-gray-200 p-2 rounded-lg">
        <!-- Logout -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
        </svg>
      </div>
      Sair
    </button>

  </div>
</header>

<!-- CONTEÚDO -->
<main class="p-6 pt-24 max-w-5xl mx-auto">

  <!-- TOPO -->
  <div class="flex justify-between items-center mb-6 gap-4">

    <input 
      type="text"
      placeholder="Buscar por pergunta, categoria ou cargo..."
      class="w-full max-w-md border rounded-lg p-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-purple-500"
    >

    <button class="bg-purple-600 text-white px-5 py-3 rounded-lg hover:bg-purple-700 transition">
      Nova Pergunta
    </button>

  </div>

  <!-- FORM PERGUNTA -->
  <div class="bg-white p-5 rounded-xl shadow mb-6 border">
    
    <input 
      type="text"
      placeholder="Digite sua pergunta..."
      class="w-full border rounded-lg p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-purple-500"
    >

    <!-- tags fixas (sem campo de adicionar) -->
    <div class="flex gap-2 flex-wrap">
      <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm">Comunicação</span>
      <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">Todos os cargos</span>
    </div>

  </div>

  <!-- LISTA -->
  <div class="flex flex-col gap-4">

    <div class="bg-white p-5 rounded-xl shadow border">
      <p class="font-medium mb-2">
        Como foi a comunicação do colaborador com a equipe?
      </p>

      <div class="flex gap-2 mb-3">
        <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm">Comunicação</span>
        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">Todos os cargos</span>
      </div>

      <div class="flex gap-2">
        <button class="bg-gray-200 px-3 py-1 rounded-lg text-sm">Editar</button>
        <button class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm">Excluir</button>
      </div>
    </div>

    <div class="bg-white p-5 rounded-xl shadow border">
      <p class="font-medium mb-2">
        O colaborador antecipou riscos ou problemas no projeto?
      </p>

      <div class="flex gap-2 mb-3">
        <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm">Proatividade</span>
        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">Todos os cargos</span>
      </div>

      <div class="flex gap-2">
        <button class="bg-gray-200 px-3 py-1 rounded-lg text-sm">Editar</button>
        <button class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm">Excluir</button>
      </div>
    </div>


    <div class="bg-white p-5 rounded-xl shadow border">
      <p class="font-medium mb-2">
        O colaborador foi ágil na execução das terefas??
      </p>

      <div class="flex gap-2 mb-3">
        <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm">Agilidade</span>
        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">Todos os cargos</span>
      </div>

      <div class="flex gap-2">
        <button class="bg-gray-200 px-3 py-1 rounded-lg text-sm">Editar</button>
        <button class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm">Excluir</button>
      </div>
    </div>



  </div>

</main>

</body>
</html>
